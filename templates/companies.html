<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    {% include 'user_navbar.html' %}

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-10 text-center md:text-left border-b border-gray-200 pb-6">
            <h1 class="text-3xl font-bold text-slate-800">Companies</h1>
            <p class="text-slate-500 mt-2">Select a company to view their interview rounds.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            {% for c in companies %}
            <a href="/rounds/{{ c[0] }}" class="block group">
                <div
                    class="bg-white rounded-lg border border-gray-200 p-6 transition-all duration-200 hover:border-indigo-500 hover:shadow-md h-full flex flex-col items-center text-center">

                    <div
                        class="w-16 h-16 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-xl font-bold mb-4 group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors">
                        {{ c[1][0]|upper }}
                    </div>

                    <h3 class="text-lg font-semibold text-slate-800 group-hover:text-indigo-600 transition-colors">
                        {{ c[1] }}
                    </h3>

                    <div class="mt-4 pt-4 border-t border-gray-100 w-full flex justify-center">
                        <span
                            class="text-sm font-medium text-slate-400 group-hover:text-indigo-500 flex items-center gap-1">
                            View Rounds &rarr;
                        </span>
                    </div>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>

</body>

</html>
